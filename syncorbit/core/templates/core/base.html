<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SyncOrbit{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0f172a;
            color: #e5e7eb;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: #020617;
            border-bottom: 1px solid #1e293b;
        }

        .navbar h2 {
            margin: 0;
            color: #38bdf8;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #cbd5f5;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #38bdf8;
        }

        /* Page container */
        .container {
            padding: 30px;
        }
        <style>
.sat-glow {
    filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.9));
}
</style>

    </style>
</head>

<body>

    <div class="navbar">
        <h2>🛰️ SyncOrbit</h2>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/dashboard/">Dashboard</a>
            <a href="/map/">Satellite Map</a>
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
